<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">

<title>Profile</title>


<style>


body{
    margin:0;
    background:black;
    color:white;
    font-family:Arial;
}

.container{
    max-width:700px;
    margin:auto;
    padding:30px;
}

.card{
    background:#111;
    border-radius:25px;
    padding:30px;
    text-align:center;
}

.profile-pic{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #1d9bf0;
}

.name{
    font-size:28px;
    font-weight:bold;
    margin-top:15px;
}

.email{
    color:gray;
}

.stats{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:30px;
}

.stat{
    background:#1a1a1a;
    padding:20px;
    border-radius:20px;
    min-width:120px;
}

.number{
    font-size:32px;
    color:#1d9bf0;
    font-weight:bold;
}

.back{
    color:#1d9bf0;
    text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<a class="back" href="index.html">
← Back
</a>

<div class="card">

<img
id="photo"
class="profile-pic"
>

<div
id="name"
class="name"
></div>

<div
id="email"
class="email"
></div>

<div class="stats">

<div class="stat">

<div
id="complaints"
class="number"
>
0
</div>

Complaints

</div>

</div>

</div>

</div>

<script>

const viewedProfile =
JSON.parse(
localStorage.getItem(
"viewProfile"
)
);

const currentUser =
JSON.parse(
localStorage.getItem(
"user"
)
);

const profile =
viewedProfile || currentUser;

document.getElementById(
"photo"
).src = profile.photo;

document.getElementById(
"name"
).innerText = profile.name;

document.getElementById(
"email"
).innerText = profile.email;
const API =
"http://127.0.0.1:8000";

async function loadStats(){

const response =
await fetch(
API + "/complaints"
);

const complaints =
await response.json();

const mine =
complaints.filter(
c =>
c.user_email === profile.email
);

document.getElementById(
"complaints"
).innerText =
mine.length;
}

loadStats();

</script>

</body>
</html>
